name: Validate skills

on:
  pull_request:
    branches: [main]
    paths:
      - "skills/**"
      - ".github/workflows/validate-skills.yml"
  push:
    branches: [main]
    paths:
      - "skills/**"

concurrency:
  group: validate-skills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: sutras validate --all
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sutras
        run: pip install --upgrade "sutras>=0.4.5"

      - name: Show sutras version
        run: sutras --version

      - name: Validate all skills
        run: sutras validate --all --path skills/
